<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Germa Search</title>
    <style>
        body {
            font-family: monospace;
            background: #0A0A0A;
            color: #FFD700;
            padding: 2rem;
        }
        
        .test-section {
            background: #1A1A1A;
            border: 1px solid #333;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 4px;
        }
        
        button {
            background: #FFD700;
            color: #0A0A0A;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }
        
        input {
            background: #333;
            color: #FFF;
            border: 1px solid #666;
            padding: 0.5rem;
            margin: 0.5rem;
            width: 300px;
        }
        
        .result {
            background: #0A0A0A;
            border: 1px solid #333;
            padding: 1rem;
            margin: 0.5rem 0;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>🧪 Germa Search Extension Test</h1>
    
    <div class="test-section">
        <h3>1. System Prompt Test</h3>
        <button onclick="testSystemPrompt()">Test System Prompt</button>
        <div id="systemPromptResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>2. API Class Test</h3>
        <button onclick="testApiClass()">Test API Class</button>
        <div id="apiClassResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>3. Fallback Queries Test</h3>
        <input type="text" id="testQuery" placeholder="Enter test query..." value="machine learning">
        <button onclick="testFallbackQueries()">Test Fallback</button>
        <div id="fallbackResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>4. Full API Test</h3>
        <input type="text" id="apiTestQuery" placeholder="Enter test query..." value="javascript tutorials">
        <button onclick="testFullApi()">Test Full API</button>
        <div id="apiTestResult" class="result"></div>
    </div>
    
    <script src="system-prompt.js"></script>
    <script src="api.js"></script>
    <script>
        function testSystemPrompt() {
            const result = document.getElementById('systemPromptResult');
            
            if (typeof SYSTEM_PROMPT !== 'undefined') {
                result.textContent = `✅ System prompt loaded successfully!\nLength: ${SYSTEM_PROMPT.length} characters\nFirst 200 chars: ${SYSTEM_PROMPT.substring(0, 200)}...`;
            } else {
                result.textContent = '❌ System prompt not loaded';
            }
        }
        
        function testApiClass() {
            const result = document.getElementById('apiClassResult');
            
            try {
                const api = new OpenRouterAPI();
                result.textContent = `✅ OpenRouterAPI class created successfully!\nBase URL: ${api.baseURL}\nModel: ${api.model}\nDev API Key: ${api.developmentApiKey ? 'Set' : 'Not set'}`;
            } catch (error) {
                result.textContent = `❌ Error creating API class: ${error.message}`;
            }
        }
        
        function testFallbackQueries() {
            const result = document.getElementById('fallbackResult');
            const query = document.getElementById('testQuery').value;
            
            try {
                const api = new OpenRouterAPI();
                const fallbackQueries = api.generateFallbackQueries(query);
                
                result.textContent = `✅ Fallback queries generated successfully!\n\n${JSON.stringify(fallbackQueries, null, 2)}`;
            } catch (error) {
                result.textContent = `❌ Error generating fallback queries: ${error.message}`;
            }
        }
        
        async function testFullApi() {
            const result = document.getElementById('apiTestResult');
            const query = document.getElementById('apiTestQuery').value;
            
            result.textContent = '🔄 Testing API call...';
            
            try {
                const api = new OpenRouterAPI();
                await api.initialize();
                
                result.textContent = '🔄 API initialized, making request...';
                
                const queries = await api.generateSearchQueries(query);
                
                result.textContent = `✅ API call successful!\n\n${JSON.stringify(queries, null, 2)}`;
            } catch (error) {
                result.textContent = `❌ API call failed: ${error.message}`;
                
                // Try fallback
                try {
                    const api = new OpenRouterAPI();
                    const fallbackQueries = api.generateFallbackQueries(query);
                    result.textContent += `\n\n🔄 Fallback queries:\n${JSON.stringify(fallbackQueries, null, 2)}`;
                } catch (fallbackError) {
                    result.textContent += `\n\n❌ Fallback also failed: ${fallbackError.message}`;
                }
            }
        }
        
        // Auto-run basic tests
        window.addEventListener('load', () => {
            testSystemPrompt();
            testApiClass();
        });
    </script>
</body>
</html>
